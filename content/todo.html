<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo / En chantier</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        background-color: #f0e5d4;
        font-family: "Times New Roman", serif;
        color: #2a1f14;
        min-height: 100vh;
        display: flex;
        font-size: 1.4em;
      }

      nav {
        width: 140px;
        flex-shrink: 0;
        padding: 2rem 1rem 4rem 2rem;
        position: sticky;
        top: 0;
        height: 100vh;
        box-sizing: border-box;
      }

      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      nav ul li a {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #5a3e28;
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }

      nav ul li a:hover,
      nav ul li a.active {
        border-bottom-color: #5a3e28;
      }

      nav ul li a.active {
        font-weight: bold;
      }

      .page {
        flex: 1;
        max-width: 750px;
        padding: 2rem 2rem 4rem 1rem;
        box-sizing: border-box;
      }

      h1 {
        font-family: "Courier New", Courier, monospace;
        font-size: 1rem;
        font-weight: normal;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: #7a5c3a;
        margin: 0 0 0.5rem;
      }

      .subtitle {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.75rem;
        color: #b0946f;
        margin: 0 0 2rem;
      }

      hr {
        border: none;
        border-top: 1px solid #c8b89a;
        margin: 0 0 2rem;
      }

      .construction-zone {
        display: flex;
        gap: 2rem;
        align-items: flex-start;
        margin-bottom: 2.5rem;
      }

      .construction-zone img {
        flex-shrink: 0;
        width: 180px;
        image-rendering: pixelated;
      }

      .notice {
        padding-top: 0.5rem;
        font-size: 1rem;
        line-height: 1.8;
        color: #4a3520;
      }

      .notice p {
        margin: 0 0 0.8rem;
      }

      .section {
        margin-bottom: 2.5rem;
      }

      .section h2 {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.78rem;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #9a7d5f;
        font-weight: normal;
        margin: 0 0 0.8rem;
        border-bottom: 1px dashed #c8b89a;
        padding-bottom: 0.3rem;
      }

      ul.todo {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      ul.todo li {
        font-size: 0.95rem;
        line-height: 1.6;
        padding: 0.2rem 0;
        display: flex;
        align-items: baseline;
        gap: 0.5rem;
        color: #2a1f14;
      }

      ul.todo li::before {
        content: "□";
        font-family: "Courier New", Courier, monospace;
        color: #b0946f;
        flex-shrink: 0;
      }

      ul.todo li.done {
        color: #a08060;
        text-decoration: line-through;
      }

      ul.todo li.done::before {
        content: "☑";
        color: #8a6a40;
      }

      ul.todo li.wip::before {
        content: "◈";
        color: #5a3e28;
      }

      ul.todo li .tag {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.68rem;
        color: #b0946f;
        border: 1px solid #c8b89a;
        padding: 0 0.3rem;
        vertical-align: middle;
      }

      footer {
        margin-top: 4rem;
        padding-top: 1.5rem;
        border-top: 1px solid #c8b89a;
        font-family: "Courier New", Courier, monospace;
        font-size: 0.75rem;
        color: #b0946f;
      }
    </style>
  </head>
  <body>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="#">cooking</a></li>
        <li><a href="notes.html">notes</a></li>
        <li><a href="projects.html">projects</a></li>
        <li><a href="#">reading</a></li>
        <li><a href="todo.html" class="active">todo</a></li>
        <li><a href="about.html">about</a></li>
      </ul>
    </nav>

    <div class="page">
      <h1>Todo</h1>
      <p class="subtitle">mise à jour — 11/22</p>
      <hr />
      <img src="web_under-construction.png" alt="under construction" />
      <div class="construction-zone">
        <div class="notice">
          <p>This page itself is a todo. Work in progress.</p>
        </div>
      </div>

      <div class="section">
        <h2>Site</h2>
        <ul class="todo">
          <li class="wip">Todo page <span class="tag">cette page</span></li>
          <li>Cooking section — add lentil recipe</li>
          <li>Projects page</li>
          <li>Reading list</li>
          <li class="done">About page</li>
          <li class="done">Notes page</li>
        </ul>
      </div>

      <footer>todo</footer>
    </div>
  </body>
</html>

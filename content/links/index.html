        display: flex;

      nav {
        width: 140px;

        padding: 2rem 1rem 4rem 2rem;

        top: 0;
        height: 100vh;
        box-sizing: border-box;
      }

      nav ul {
        list-style: none;
        padding: 0;
        margin: 0;
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
      }

      nav ul li a {
        font-family: "Courier New", Courier, monospace;
        font-size: 0.8rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: #5a3e28;
        text-decoration: none;
        border-bottom: 1px solid transparent;
      }

      nav ul li a:hover,

      }

        flex: 1;
        max-width: 750px;
        padding: 2rem 2rem 4rem 1rem;
        box-sizing: border-box;
      }

      h1 {
        font-family: "Courier New", Courier, monospace;
        font-size: 1.4em;
        letter-spacing: 0.05em;
        border-bottom: 1px solid #999;
        padding-bottom: 0.3em;
        margin-bottom: 1.5em;
      }

      ul.links {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      ul.links li {
        margin-bottom: 0.8em;
      }

      ul.links li a {
        font-family: "Courier New", Courier, monospace;
        font-size: 1em;
        color: #5a3e28;
        text-decoration: none;
        border-bottom: 1px dotted #aaa;
      }

      ul.links li a:hover {
        border-bottom-color: #5a3e28;
      }

      ul.links li span {
        font-size: 0.85em;
        color: #888;
        margin-left: 0.8em;
      }

      footer {
        margin-top: 3em;
        padding-top: 0.5em;
        border-top: 1px solid #aaa;
        font-size: 0.8em;
        color: #888;
        font-family: "Courier New", Courier, monospace;
      }
